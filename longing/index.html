<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给你的信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            overflow: hidden;
        }
        
        /* 信封页面样式 */
        .envelope-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e8f4f8;
            transition: all 1s ease;
        }
        
        .envelope {
            width: 400px;
            height: 250px;
            background-color: #ff6b6b;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform-style: preserve-3d;
            transition: all 0.6s ease;
        }
        
        .envelope:hover {
            transform: translateY(-10px) rotateY(5deg);
        }
        
        .envelope:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background-color: #ff5252;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            z-index: 1;
        }
        
        .envelope-text {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 18px;
            z-index: 2;
        }
        
        /* 信件页面样式 */
        .letter-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            position: relative;
            overflow: hidden;
        }
        
        .letter-page {
            width: 100%;
            height: 100%;
            padding: 60px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .letter-page.active {
            display: flex;
        }
        
        .letter-content {
            max-width: 600px;
            line-height: 1.8;
            font-size: 18px;
            color: #333;
            margin-bottom: 40px;
        }
        
        .next-button,
        .prev-button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            bottom: 40px;
        }
        
        .next-button {
            right: 40px;
        }
        
        .prev-button {
            left: 40px;
            background-color: #4ecdc4;
        }
        
        .next-button:hover {
            background-color: #ff5252;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
        
        .prev-button:hover {
            background-color: #45b7aa;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }
        
        /* 音频元素 */
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 音频元素 -->
    <audio id="bgm" loop>
        <source src="1月23日.MP3" type="audio/mpeg">
    </audio>
    
    <!-- 信封页面 -->
    <div class="envelope-container" id="envelopeContainer">
        <div class="envelope" id="envelope">
            <div class="envelope-text">点击打开信封</div>
        </div>
    </div>
    
    <!-- 信件页面 -->
    <div class="letter-container" id="letterContainer">
        <!-- 第一页 -->
        <div class="letter-page active" id="page1">
            <div class="letter-content">
                <h2>你就是我的第一页信件</h2>
                <p>当我写下这封信时，脑海中全是你的身影。</p>
                <p>每一个字都承载着我对你的思念和爱意。</p>
                <p>这是我们故事的开始，也是我对你最真挚的表白。</p>
            </div>
            <button class="next-button" onclick="nextPage()">下一页</button>
        </div>
        
        <!-- 第二页 -->
        <div class="letter-page" id="page2">
            <div class="letter-content">
                <h2>第二页</h2>
                <p>想起我们第一次相遇的场景，仿佛就在昨天。</p>
                <p>你的笑容像阳光一样温暖了我的心房。</p>
                <p>从那一刻起，我就知道你是我要找的人。</p>
            </div>
            <button class="prev-button" onclick="prevPage()">上一页</button>
            <button class="next-button" onclick="nextPage()">下一页</button>
        </div>
        
        <!-- 第三页 -->
        <div class="letter-page" id="page3">
            <div class="letter-content">
                <h2>第三页</h2>
                <p>和你在一起的每一天都是如此美好。</p>
                <p>无论是晴天还是雨天，有你的陪伴就是最幸福的时光。</p>
                <p>我希望我们能一直这样走下去，直到永远。</p>
            </div>
            <button class="prev-button" onclick="prevPage()">上一页</button>
            <button class="next-button" onclick="nextPage()">下一页</button>
        </div>
        
        <!-- 第四页 -->
        <div class="letter-page" id="page4">
            <div class="letter-content">
                <h2>最后一页</h2>
                <p>这封信即将结束，但我们的故事才刚刚开始。</p>
                <p>我会用我的一生来爱你、呵护你。</p>
                <p>你是我生命中最珍贵的礼物，我爱你。</p>
            </div>
            <button class="prev-button" onclick="prevPage()">上一页</button>
        </div>
    </div>
    
    <script>
        let currentPage = 1;
        const totalPages = 4;
        
        // 点击信封事件
        document.getElementById('envelope').addEventListener('click', function() {
            // 播放BGM
            const bgm = document.getElementById('bgm');
            bgm.play();
            
            // 隐藏信封页面，显示信件页面
            document.getElementById('envelopeContainer').style.display = 'none';
            document.getElementById('letterContainer').style.display = 'block';
        });
        
        // 下一页函数
        function nextPage() {
            if (currentPage < totalPages) {
                // 隐藏当前页面
                document.getElementById('page' + currentPage).classList.remove('active');
                
                // 显示下一页
                currentPage++;
                document.getElementById('page' + currentPage).classList.add('active');
            }
        }
        
        // 上一页函数
        function prevPage() {
            if (currentPage > 1) {
                // 隐藏当前页面
                document.getElementById('page' + currentPage).classList.remove('active');
                
                // 显示上一页
                currentPage--;
                document.getElementById('page' + currentPage).classList.add('active');
            }
        }
    </script>
</body>
</html>
